<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tính số hộp gạch cần dùng</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Tính số hộp gạch cần dùng</h1>
      <p class="subtitle">
        Nhập diện tích cần lát sẵn theo m² và chọn loại gạch để tính số hộp cần mua
      </p>

      <div class="form-grid">
        <div class="form-group">
          <label for="area">Diện tích cần lát (m²)</label>
          <input type="number" id="area" step="0.01" placeholder="Ví dụ: 25" />
        </div>

        <div class="form-group">
          <label for="tileCategory">Chọn loại gạch</label>
          <select id="tileCategory" onchange="updateTileSizes()">
            <option value="">-- Chọn loại --</option>
            <option value="small">Gạch nhỏ (nhà tắm, ban công)</option>
            <option value="medium">Gạch trung bình (phòng nhỏ, vừa)</option>
            <option value="large">Gạch lớn (phòng khách, sảnh, biệt thự)</option>
            <option value="common">Gạch ốp phổ biến</option>
            <option value="decoration">Gạch ốp trang trí/điểm</option>
            <option value="large-format">Gạch ốp khổ lớn</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tileSize">Kích thước viên gạch (cm)</label>
          <select id="tileSize" onchange="setTileDimensions()">
            <option value="">-- Chọn kích thước --</option>
          </select>
        </div>

        <div class="form-group">
          <label for="tilesPerBox">Số viên mỗi hộp</label>
          <input type="number" id="tilesPerBox" step="1" placeholder="Ví dụ: 6" />
        </div>

        <div class="form-group">
          <label for="wastage">Hao hụt (%)</label>
          <input type="number" id="wastage" step="1" value="0" placeholder="Ví dụ: 0" />
        </div>

        <div class="form-group">
          <label for="boxPrice">Số tiền một hộp (đ) - Tùy chọn</label>
          <input type="number" id="boxPrice" step="1" placeholder="Ví dụ: 100000" />
        </div>
      </div>

      <!-- Hidden fields for dimensions -->
      <input type="hidden" id="tileWidth" value="" />
      <input type="hidden" id="tileLength" value="" />

      <div class="button-group">
        <button class="btn primary" type="button" onclick="calculateBoxes()">
          Tính số hộp cần mua
        </button>
        <button class="btn secondary" type="button" onclick="resetForm()">
          Xóa dữ liệu
        </button>
      </div>

      <div id="result" class="result hidden"></div>

      <div class="note">
        Gợi ý: nếu lát chéo hoặc cắt ghép nhiều, nên để hao hụt 7% đến 10%.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
